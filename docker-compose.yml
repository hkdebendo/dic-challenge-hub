
services:
  platform:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python platform/manage.py migrate && python platform/manage.py seed_nova && python platform/manage.py seed_hackathon_ai && python platform/manage.py seed_smart_incident && python platform/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  nova-portal:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python C5/app.py"
    volumes:
      - .:/app
    ports:
      - "5005:5005"
