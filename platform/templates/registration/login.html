{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Connexion</h1>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button" type="submit">Se connecter</button>
  </form>
  <p class="muted">Pas encore de compte ? <a href="{% url 'register' %}">Créer un compte</a></p>
</section>
{% endblock %}
